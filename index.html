<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportunity Verifier | MLRIT F17</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-900 text-white p-6 shadow-xl">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">MLRIT <span class="font-light">Verifier</span></h1>
            <div class="text-right">
                <p class="text-xs font-mono">TEAM F17</p>
                <p class="text-xs opacity-75">Review-1 Demo</p>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto mt-12 p-4">
        <div class="bg-white rounded-3xl shadow-2xl p-8">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Paste Opportunity Below</h2>
            <textarea id="userInput" rows="5" class="w-full p-4 border-2 border-gray-100 rounded-2xl focus:border-blue-500 focus:ring-0 transition-all mb-6 outline-none" placeholder="Paste link or WhatsApp message..."></textarea>
            
            <button onclick="runAnalysis()" id="btn" class="w-full bg-blue-600 hover:bg-blue-800 text-white font-bold py-4 rounded-2xl transition-all shadow-lg flex justify-center items-center gap-3">
                <i class="fa-solid fa-magnifying-glass-chart"></i> Analyze Opportunity
            </button>
        </div>

        <div id="results" class="mt-8 hidden animate-bounce-in">
            <div id="card" class="bg-white rounded-3xl shadow-2xl overflow-hidden border-t-8 border-blue-600">
                <div class="p-8 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-400 uppercase font-bold tracking-widest">Verdict</p>
                        <h3 id="status" class="text-3xl font-black italic">...</h3>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-gray-400 uppercase font-bold tracking-widest">Trust Score</p>
                        <h3 id="score" class="text-5xl font-black text-blue-600">0%</h3>
                    </div>
                </div>
                <div class="bg-gray-50 p-6 border-t border-gray-100">
                    <h4 class="text-xs font-bold text-gray-400 uppercase mb-3">Technical Analysis</h4>
                    <ul id="warnings" class="space-y-2 text-sm text-gray-600"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function runAnalysis() {
            const text = document.getElementById('userInput').value;
            const btn = document.getElementById('btn');
            const results = document.getElementById('results');

            if(!text) return alert("Please paste some content!");

            btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Processing...';
            btn.disabled = true;

            try {
                const response = await fetch('https://mlrit-verifier-back.onrender.com', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ content: text })
                });
                const data = await response.json();

                results.classList.remove('hidden');
                document.getElementById('score').innerText = data.score + "%";
                document.getElementById('status').innerText = data.status;
                
                // Color change based on status
                const card = document.getElementById('card');
                if(data.score >= 80) card.className = "bg-white rounded-3xl shadow-2xl overflow-hidden border-t-8 border-green-500";
                else if(data.score >= 50) card.className = "bg-white rounded-3xl shadow-2xl overflow-hidden border-t-8 border-yellow-500";
                else card.className = "bg-white rounded-3xl shadow-2xl overflow-hidden border-t-8 border-red-500";

                document.getElementById('warnings').innerHTML = data.warnings.map(w => `<li class="flex items-center gap-2"><i class="fa-solid fa-circle-check text-blue-500 text-[8px]"></i> ${w}</li>`).join('');

            } catch (e) {
                alert("Make sure main.py is running!");
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-magnifying-glass-chart"></i> Analyze Opportunity';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
